<!-- BETÖLTÉS -->
<div *ngIf="!profileLoaded" class="card">
  <h2>Posztötletek</h2>
  <p class="muted">Profil betöltése…</p>
</div>

<!-- NINCS PROFIL -->
<app-profile-missing
  *ngIf="profileLoaded && !hasProfile"
  [data]="profileMissingData"
  [error]="error"
  (createProfile)="goOnboarding()"
></app-profile-missing>

<!-- VAN PROFIL -->
<div *ngIf="profileLoaded && hasProfile" class="card ideas">
  <app-ideas-header [data]="ideasHeaderData"></app-ideas-header>

  <app-idea-form
    [industry]="industry"
    [targetAudience]="targetAudience"
    [tone]="tone"
    [loading]="loading"
    [error]="error"
    (industryChange)="industry = $event"
    (audienceChange)="targetAudience = $event"
    (toneChange)="tone = $event"
    (generateIdeas)="onGenerate()"
    (generatePost)="onGeneratePost()"
  ></app-idea-form>
</div>

<!-- KONKRÉT POSZT -->
<app-post-result [post]="post" [platform]="preferredPlatform"></app-post-result>


<!-- ÖTLETEK LISTA -->
<div *ngIf="ideas.length > 0" class="card ideas-list-container">
  <h3>Ötletek</h3>

  <p *ngIf="toast" class="muted">{{ toast }}</p>

  <ul class="ideas-list">
    <li *ngFor="let idea of ideas" class="idea-item">
      <div class="idea-text">{{ idea.text }}</div>

      <button
        class="btn secondary save-btn"
        (click)="saveFavorite(idea.text)"
      >
        Mentés kedvencek közé
      </button>
    </li>
  </ul>
</div>
