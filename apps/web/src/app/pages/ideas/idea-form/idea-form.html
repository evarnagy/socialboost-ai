<div class="form">
  <div class="profile-info">
    <div class="profile-field">
      <span class="field-label">Üzletág</span>
      <span class="field-value">{{ industry }}</span>
    </div>
    <div class="profile-field">
      <span class="field-label">Célközönség</span>
      <span class="field-value">{{ targetAudience }}</span>
    </div>
    <div class="profile-field">
      <span class="field-label">Hangnem</span>
      <span class="field-value">{{ toneLabel }}</span>
    </div>
  </div>

  <button class="btn primary action-btn" (click)="onGeneratePost()" [disabled]="loading || !isFormValid()">
    {{ loading ? 'Generálok…' : 'Konkrét poszt generálása' }}
  </button>

  <button
    class="btn secondary action-btn"
    (click)="onGenerate()"
    [disabled]="loading || !isFormValid()"
  >
    {{ loading ? 'Generálok…' : 'Posztötletek generálása' }}
  </button>

  <p *ngIf="error" class="error error-text">{{ error }}</p>
</div>
