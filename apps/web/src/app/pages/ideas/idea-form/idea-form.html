<div class="form">
  <input
    class="input"
    [(ngModel)]="industry"
    (ngModelChange)="industryChange.emit($event)"
    placeholder="Üzletág"
  />

  <input
    class="input"
    [(ngModel)]="targetAudience"
    (ngModelChange)="audienceChange.emit($event)"
    placeholder="Célközönség"
  />

  <div class="form-row">
    <select class="input" [(ngModel)]="tone" (ngModelChange)="toneChange.emit($event)">
      <option *ngFor="let option of toneOptions" [value]="option.value">
        {{ option.label }}
      </option>
    </select>

  </div>

 <button class="btn primary action-btn" (click)="onGeneratePost()" [disabled]="loading || !isFormValid()">
       {{ loading ? 'Generálok…' : 'Konkrét poszt generálása' }}
    </button>

  <button
    class="btn secondary action-btn"
    (click)="onGenerate()"
    [disabled]="loading || !isFormValid()"
  >
    {{ loading ? 'Generálok…' : 'Posztötletek generálása' }}
  </button>

  <p *ngIf="error" class="error error-text">{{ error }}</p>
</div>
