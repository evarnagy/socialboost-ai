<div class="library">
  <library-header></library-header>

  <library-loading *ngIf="loading"></library-loading>
  <library-error *ngIf="error" [error]="error"></library-error>
  <library-empty *ngIf="!loading && !error && items.length === 0"></library-empty>
  <library-list
    *ngIf="items.length > 0"
    [items]="items"
    [deletingId]="deletingId"
    (delete)="handleDelete($event)"
  ></library-list>

  </div>
