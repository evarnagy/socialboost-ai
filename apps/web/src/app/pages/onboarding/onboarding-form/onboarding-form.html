<div class="profile-form">
  <input class="input" [ngModel]="industry" (ngModelChange)="industryChange.emit($event)" placeholder="Üzletág (pl. kozmetika, fotós)" />
  <input class="input" [ngModel]="targetAudience" (ngModelChange)="audienceChange.emit($event)" placeholder="Célközönség (pl. 25-45 nők, Szeged)" />

  <button class="btn save-btn" (click)="save.emit()" [disabled]="loading || !industry || !targetAudience">
    Mentés
  </button>

  <p *ngIf="error" class="error">{{ error }}</p>
</div>
