<section class="heroWrap">
  <div class="hero card">
    <div class="heroLeft">
      <div class="pill">
        <span class="spark">✨</span>
        <span>SocialBoost AI</span>
        <span class="dotSep">•</span>
        <span class="muted">posztok percek alatt</span>
      </div>

      <h1>
        Posztötletek és posztok,
        <span class="grad">pár kattintással</span>.
      </h1>

      <p class="lead muted">
        Add meg az üzletágad és a célközönséged — a SocialBoost AI strukturált, posztolható tartalmat ad:
        hook, caption, CTA és hashtagek. Kezdő vállalkozóknak, gyorsan.
      </p>

      <app-cta-row [buttons]="heroCtas" (buttonClick)="start()"></app-cta-row>

      <div class="stats">
        <app-stats-item
          *ngFor="let stat of stats"
          [num]="stat.num"
          [label]="stat.label"
        ></app-stats-item>
      </div>

      <div class="trust">
        <app-trust-item
          *ngFor="let item of trust"
          [icon]="item.icon"
          [label]="item.label"
        ></app-trust-item>
      </div>
    </div>

    <div class="heroRight">
      <app-mock-post [data]="mockPost"></app-mock-post>

      <app-side-card title="Miért jobb így?" [items]="sideCardItems"></app-side-card>
    </div>
  </div>
</section>

<section class="grid3">
  <app-feature-card
    *ngFor="let feature of features"
    [icon]="feature.icon"
    [title]="feature.title"
    [description]="feature.description"
  ></app-feature-card>
</section>

<section class="card how">
  <app-how-header [data]="howHeader"></app-how-header>

  <div class="howSteps">
    <app-step-item
      *ngFor="let step of steps"
      [number]="step.number"
      [title]="step.title"
      [description]="step.description"
    ></app-step-item>
  </div>

  <app-cta-row [buttons]="bottomCtas" (buttonClick)="start()"></app-cta-row>
</section>

<app-footer [data]="footer"></app-footer>
