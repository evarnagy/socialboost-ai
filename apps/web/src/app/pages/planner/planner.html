<div class="card planner-card">
  <app-planner-header [data]="headerData"></app-planner-header>
  <app-planner-actions
    [loading]="loading"
    [error]="error"
    (generate)="onGenerate()"
  ></app-planner-actions>
  <app-planner-list *ngIf="plan.length > 0" [plan]="plan"></app-planner-list>
</div>
