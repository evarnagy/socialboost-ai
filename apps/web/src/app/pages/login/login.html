<div class="card login-card">
  <app-login-header [data]="loginHeaderData"></app-login-header>
  <app-login-form
    [email]="email"
    [password]="password"
    [loading]="loading"
    [error]="error"
    (emailChange)="email = $event"
    (passwordChange)="password = $event"
    (login)="onLogin()"
    (register)="onRegister()"
  ></app-login-form>
</div>
